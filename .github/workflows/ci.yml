name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Secret scanning ──────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can diff all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Python lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint — ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check custom_components/

      - name: Ruff format check
        run: ruff format --check custom_components/

  # ── 3. Home Assistant integration validation ────────────────────────────────
  hassfest:
    name: Hassfest — HA integration validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master
